<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--card:#1e2535;--card2:#242b3d;
--border:#2a3350;--accent:#4f8ef7;--accent2:#6ee7b7;--accent3:#f59e0b;
--text:#e8eaf6;--text2:#8892b0;--text3:#4a5568;
--red:#ef4444;--green:#10b981;--yellow:#f59e0b;--purple:#a78bfa;
--font:'Sora',sans-serif;--body:'DM Sans',sans-serif;
--r:12px;--r2:8px;--sh:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;width:220px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:.3s}
.logo{padding:20px 18px 12px;border-bottom:1px solid var(--border)}
.logo-name{font-family:var(--font);font-weight:700;font-size:15px;color:var(--accent);letter-spacing:.5px}
.logo-sub{font-size:10px;color:var(--text2);margin-top:2px}
.nav-section{padding:14px 10px 4px;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 6px;border-radius:var(--r2);cursor:pointer;font-size:13px;color:var(--text2);transition:.15s;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(79,142,247,.15);color:var(--accent);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent);border-radius:2px}
.nav-icon{font-size:14px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600}

/* MAIN */
.main{margin-left:220px;min-height:100vh;padding:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-family:var(--font);font-size:17px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer}
.notif{width:32px;height:32px;border-radius:var(--r2);background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1px solid var(--bg2)}
.content{padding:24px 28px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* STAT CARDS */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-blue::before{background:var(--accent)}
.stat-green::before{background:var(--green)}
.stat-yellow::before{background:var(--yellow)}
.stat-purple::before{background:var(--purple)}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:500}
.stat-val{font-family:var(--font);font-size:26px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}
.stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.12}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:.15s;font-family:var(--body)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3a7ae8}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg3);border-color:var(--text2)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff;padding:6px 12px;font-size:12px}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-warn{background:var(--yellow);color:#000}

/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.badge-green{background:rgba(16,185,129,.15);color:var(--green)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-purple{background:rgba(167,139,250,.15);color:var(--purple)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 14px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border)}
.tbl td{padding:12px 14px;border-bottom:1px solid rgba(42,51,80,.5);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(79,142,247,.03)}

/* FORM */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:13px;font-family:var(--body);outline:none;transition:.15s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.1)}
.form-select{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:13px;font-family:var(--body);outline:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* SERVICE CARD */
.service-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.2s}
.service-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.service-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:44px}
.gym-bg{background:linear-gradient(135deg,#1a2535,#0d1a2e)}
.hostel-bg{background:linear-gradient(135deg,#1a251a,#0d1f0d)}
.hotel-bg{background:linear-gradient(135deg,#25201a,#1f170d)}
.restaurant-bg{background:linear-gradient(135deg,#251a20,#1f0d17)}
.coaching-bg{background:linear-gradient(135deg,#1a1a25,#0d0d1f)}
.service-body{padding:14px}
.service-name{font-family:var(--font);font-size:14px;font-weight:600;margin-bottom:4px}
.service-meta{font-size:12px;color:var(--text2)}
.service-price{font-size:13px;color:var(--accent);font-weight:600;margin-top:6px}
.stars{color:var(--yellow);font-size:12px}

/* PROGRESS BAR */
.progress-wrap{background:var(--bg3);border-radius:4px;height:6px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:.3s}

/* TIMELINE */
.timeline-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(42,51,80,.4)}
.timeline-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.timeline-content{flex:1}
.timeline-title{font-size:13px;font-weight:500}
.timeline-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* AUTH */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:420px;max-width:95vw}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-title{font-family:var(--font);font-size:22px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text2)}
.auth-tabs{display:flex;background:var(--bg3);border-radius:var(--r2);padding:3px;margin-bottom:22px}
.auth-tab{flex:1;text-align:center;padding:7px;border-radius:6px;font-size:13px;cursor:pointer;transition:.15s;color:var(--text2)}
.auth-tab.active{background:var(--accent);color:#fff;font-weight:500}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:.15s;font-weight:500}
.filter-chip.active,.filter-chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.08)}

/* BOOKING CARD */
.booking-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;gap:14px;align-items:flex-start}
.booking-icon{width:44px;height:44px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* MINI CHART */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px}
.bar{flex:1;border-radius:4px 4px 0 0;opacity:.8;transition:.3s;cursor:default}
.bar-label{font-size:9px;color:var(--text2);text-align:center;margin-top:4px}

/* MISC */
.section-title{font-family:var(--font);font-size:15px;font-weight:600;margin-bottom:14px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-green{background:var(--green)}
.dot-yellow{background:var(--yellow)}
.dot-red{background:var(--red)}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;font-size:11px}
.avatar-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.hidden{display:none!important}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.flex{display:flex}.items-center{align-items:center}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.justify-between{justify-content:space-between}.flex-1{flex:1}.text-right{text-align:right}
.muted{color:var(--text2)}.small{font-size:12px}.bold{font-weight:600}
.text-accent{color:var(--accent)}.text-green{color:var(--green)}.text-red{color:var(--red)}.text-yellow{color:var(--yellow)}
.w100{width:100%}.relative{position:relative}
</style>
</head>
<body>

<!-- ========== SIDEBAR ========== -->
<div class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-name">SBSMS</div>
    <div class="logo-sub">Business Service Management</div>
  </div>

  <div class="nav-section">Customer</div>
  <div class="nav-item active" onclick="goto('home')"><span class="nav-icon">🏠</span>Home</div>
  <div class="nav-item" onclick="goto('services')"><span class="nav-icon">🔍</span>Browse Services</div>
  <div class="nav-item" onclick="goto('service-detail')"><span class="nav-icon">📋</span>Service Detail</div>
  <div class="nav-item" onclick="goto('booking')"><span class="nav-icon">📅</span>Book Service</div>
  <div class="nav-item" onclick="goto('my-bookings')"><span class="nav-icon">🗂️</span>My Bookings<span class="nav-badge">3</span></div>
  <div class="nav-item" onclick="goto('payment')"><span class="nav-icon">💳</span>Payment</div>

  <div class="nav-section">Owner</div>
  <div class="nav-item" onclick="goto('owner-dashboard')"><span class="nav-icon">📊</span>Owner Dashboard</div>
  <div class="nav-item" onclick="goto('add-service')"><span class="nav-icon">➕</span>Add Service</div>
  <div class="nav-item" onclick="goto('manage-bookings')"><span class="nav-icon">✅</span>Manage Bookings<span class="nav-badge">5</span></div>
  <div class="nav-item" onclick="goto('update-payment')"><span class="nav-icon">💰</span>Update Payment</div>

  <div class="nav-section">Admin</div>
  <div class="nav-item" onclick="goto('admin-dashboard')"><span class="nav-icon">🛡️</span>Admin Dashboard</div>
  <div class="nav-item" onclick="goto('manage-users')"><span class="nav-icon">👥</span>Manage Users</div>
  <div class="nav-item" onclick="goto('verify-services')"><span class="nav-icon">🔐</span>Verify Services</div>

  <div style="margin-top:auto;padding:14px 10px;border-top:1px solid var(--border)">
    <div class="nav-item" onclick="goto('login')"><span class="nav-icon">🔑</span>Login / Register</div>
  </div>
</div>

<!-- ========== MAIN ========== -->
<div class="main" id="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Home</div>
    <div class="topbar-right">
      <div class="notif">🔔<span class="notif-dot"></span></div>
      <div class="avatar">U</div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const titles={
  'login':'Login / Register',
  'home':'Home — Browse City & Services',
  'services':'Service Listings',
  'service-detail':'Service Detail',
  'booking':'Book a Service',
  'my-bookings':'My Bookings',
  'payment':'Payment',
  'owner-dashboard':'Owner Dashboard',
  'add-service':'Add New Service',
  'manage-bookings':'Manage Bookings',
  'update-payment':'Update Payment Status',
  'admin-dashboard':'Admin Dashboard',
  'manage-users':'Manage Users',
  'verify-services':'Verify Services'
};

const pages={

// ── LOGIN ────────────────────────────────────────────────────────
'login':()=>`
<div style="max-width:420px;margin:0 auto">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:32px;margin-bottom:8px">🏢</div>
      <div class="auth-title">Welcome Back</div>
      <div class="auth-sub">Sign in to your account</div>
    </div>
    <div class="auth-tabs" style="margin-bottom:22px">
      <div class="auth-tab active">Sign In</div>
      <div class="auth-tab" onclick="this.parentNode.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));this.classList.add('active');document.getElementById('reg-fields').classList.toggle('hidden')">Register</div>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" placeholder="you@example.com" value="user@gmail.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" placeholder="••••••••" value="••••••••"/>
    </div>
    <div id="reg-fields" class="hidden">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-select">
          <option>Customer</option><option>Business Owner</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input class="form-input" placeholder="+91 9876543210"/>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer">
        <input type="checkbox" checked/> Remember me
      </label>
      <span style="font-size:12px;color:var(--accent);cursor:pointer">Forgot password?</span>
    </div>
    <button class="btn btn-primary w100" onclick="goto('home')" style="justify-content:center;padding:12px">Sign In →</button>
    <div class="divider">or continue with</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn btn-outline" style="justify-content:center">🔵 Google</button>
      <button class="btn btn-outline" style="justify-content:center">📘 GitHub</button>
    </div>
  </div>
</div>`,

// ── HOME ─────────────────────────────────────────────────────────
'home':()=>`
<div>
  <div style="background:linear-gradient(135deg,#1a2535 0%,#0d1525 100%);border-radius:16px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-30px;right:-30px;font-size:120px;opacity:.06">🏙️</div>
    <div style="font-family:var(--font);font-size:24px;font-weight:700;margin-bottom:6px">Find the Best Services 🌟</div>
    <div style="color:var(--text2);margin-bottom:20px;font-size:14px">Gyms, Hostels, Hotels, Coaching & more — all in one place</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px;position:relative">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px">📍</span>
        <select class="form-select" style="padding-left:36px">
          <option>Mumbai</option><option>Pune</option><option>Bangalore</option><option>Delhi</option><option>Surat</option><option>Sangli</option>
        </select>
      </div>
      <div style="flex:2;min-width:220px;position:relative">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px">🔍</span>
        <input class="form-input" placeholder="Search gyms, hotels, coaching..." style="padding-left:36px"/>
      </div>
      <button class="btn btn-primary" onclick="goto('services')">Search</button>
    </div>
  </div>

  <div class="section-title">Choose a Category</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px">
    ${[['🏋️','Gym','320+ listings'],['🏠','Hostel','180+ rooms'],['🏨','Hotel','240+ hotels'],['🍽️','Restaurant','150+ eateries'],['🎓','Coaching','90+ classes']].map(([e,n,s])=>`
    <div class="card" style="text-align:center;cursor:pointer;transition:.2s" onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='var(--border)'" onclick="goto('services')">
      <div style="font-size:32px;margin-bottom:8px">${e}</div>
      <div style="font-weight:600;font-size:13px;margin-bottom:2px">${n}</div>
      <div class="muted small">${s}</div>
    </div>`).join('')}
  </div>

  <div class="section-head">
    <div class="section-title" style="margin:0">Featured Services</div>
    <button class="btn btn-outline btn-sm" onclick="goto('services')">View All →</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px">
    ${[['🏋️','PowerFit Gym','Mumbai','gym-bg','₹999/mo','4.8',true],['🏨','The Grand Hotel','Pune','hotel-bg','₹2500/night','4.6',false],['🎓','TopRank Classes','Bangalore','coaching-bg','₹1500/mo','4.9',true]].map(([e,n,c,bg,p,r,f])=>`
    <div class="service-card" onclick="goto('service-detail')">
      <div class="service-img ${bg}">${e}${f?'<span style="position:absolute;top:8px;right:8px;background:var(--yellow);color:#000;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700">FEATURED</span>':''}</div>
      <div class="service-body">
        <div class="service-name">${n}</div>
        <div class="service-meta">📍 ${c}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <div class="service-price">${p}</div>
          <div class="stars">★ ${r}</div>
        </div>
      </div>
    </div>`).join('')}
  </div>

  <div class="section-title">Why Choose Us?</div>
  <div class="grid4">
    ${[['✅','Verified Businesses','All listed services are admin-verified'],['🔔','Smart Reminders','Automated payment & booking alerts'],['💳','Easy Payments','Cash, UPI & online methods'],['📊','Live Tracking','Track bookings & payments in real-time']].map(([e,t,d])=>`
    <div class="card-sm"><div style="font-size:22px;margin-bottom:8px">${e}</div><div style="font-weight:600;font-size:13px;margin-bottom:4px">${t}</div><div class="muted small">${d}</div></div>`).join('')}
  </div>
</div>`,

// ── SERVICE LIST ──────────────────────────────────────────────────
'services':()=>`
<div>
  <div style="display:flex;gap:14px;margin-bottom:20px">
    <div style="flex:1;position:relative"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px">🔍</span><input class="form-input" placeholder="Search services..." style="padding-left:36px" value="Gym"/></div>
    <select class="form-select" style="width:140px"><option>Mumbai</option><option>Pune</option><option>Bangalore</option></select>

function goto(page){
  document.getElementById('content').innerHTML=pages[page]?pages[page]():`<div class="card"><p>Page not found</p></div>`;
  document.getElementById('page-title').textContent=titles[page]||page;
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active',n.textContent.trim().startsWith(titles[page]?.slice(0,5)||'NONE'));
  });
  document.querySelectorAll('.nav-item').forEach(n=>{
    const t=n.getAttribute('onclick');
    if(t&&t.includes(`'${page}'`))n.classList.add('active');
    else n.classList.remove('active');
  });
}

goto('home');
